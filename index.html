<script>
    // FIX: Ensure there is NO /rest/v1/ at the end
    const SB_URL = 'https://fcwhiqvwbkvzrjiiokib.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjd2hpcXZ3Ymt2enJqaWlva2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjYxNTYsImV4cCI6MjA5MjUwMjE1Nn0.8hqi3pHOgVMZ943yzwslSrrwNjgDH6PHK7L677HPDDM';
    
    // Use sbClient to avoid the name conflict error you had earlier
    const sbClient = supabase.createClient(SB_URL, SB_KEY);

    async function load() {
        const { data: vdis, error: vdiError } = await sbClient.from('vdi_tracker').select('*').order('vdi_name');
        const { data: members, error: memError } = await sbClient.from('team_members').select('name').order('name');
        
        if (vdiError || memError) {
            console.error("Database Error:", vdiError || memError);
            document.getElementById('sync-status').innerText = "● Connection Error";
            document.getElementById('sync-status').style.color = "#ef4444";
            return;
        }

        const teamDropdown = ["Available", ...(members ? members.map(m => m.name) : [])];

        document.getElementById('vdi-list').innerHTML = vdis.map(v => `
            <div class="vdi-row">
                <div>
                    <strong>${v.vdi_name}</strong><br>
                    <span class="badge ${v.status}">${v.status}</span>
                </div>
                <select onchange="updateVDI(${v.id}, 'user_name', this.value)">
                    ${teamDropdown.map(u => `<option value="${u}" ${v.user_name === u ? 'selected' : ''}>${u}</option>`).join('')}
                </select>
                <select onchange="updateVDI(${v.id}, 'status', this.value)">
                    <option value="Active" ${v.status === 'Active' ? 'selected' : ''}>Active</option>
                    <option value="Idle" ${v.status === 'Idle' ? 'selected' : ''}>Idle</option>
                    <option value="Offline" ${v.status === 'Offline' ? 'selected' : ''}>Offline</option>
                </select>
                <button onclick="deleteVDI(${v.id})" style="border:none; background:none; cursor:pointer;">🗑️</button>
            </div>
        `).join('');
        
        document.getElementById('sync-status').innerText = "● Synchronized";
        document.getElementById('sync-status').style.color = "#10b981";
    }

    // ... rest of your updateVDI and deleteVDI functions ...
    load();
    setInterval(load, 5000); 
</script>
