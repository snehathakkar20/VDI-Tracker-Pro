<!DOCTYPE html>
<html>
<head>
    <title>VDI Nexus Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
        .vdi-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr auto; gap: 15px; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .vdi-name { font-weight: bold; color: #1e293b; }
        .status-tag { font-size: 0.8em; font-weight: bold; color: #16a34a; background: #dcfce7; padding: 4px 8px; border-radius: 4px; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; width: 100%; }
        .save-btn { background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85em; }
        .save-btn:hover { background: #059669; }
        .timestamp { font-size: 0.75em; color: #94a3b8; }
        .footer { text-align: center; margin-top: 30px; font-weight: bold; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🖥️ VDI Live Dashboard</h2>
        <div style="color: #10b981; font-weight: bold;">● Active System</div>
    </div>
    
    <div id="vdi-display">Syncing...</div>
    
    <div class="footer">Created by Sneha Thakkar</div>
</div>

<script>
    const SB_URL = 'https://fcwhiqvwbkvzrjiiokib.supabase.co/rest/v1/'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjd2hpcXZ3Ymt2enJqaWlva2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjYxNTYsImV4cCI6MjA5MjUwMjE1Nn0.8hqi3pHOgVMZ943yzwslSrrwNjgDH6PHK7L677HPDDM';
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    async function loadData() {
        const { data: users } = await supabase.from('team_members').select('name').order('name');
        const { data: vdis } = await supabase.from('vdi_tracker').select('*').order('vdi_name');
        
        if (vdis && users) render(vdis, users.map(u => u.name));
    }

    async function saveChange(id, selectId) {
        const selectedUser = document.getElementById(selectId).value;
        const now = new Date().toLocaleString();

        const { error } = await supabase
            .from('vdi_tracker')
            .update({ 
                user_name: selectedUser, 
                updated_at: new Date().toISOString() 
            })
            .eq('id', id);

        if(!error) {
            alert(`Saved: ${selectedUser} assigned.`);
            loadData();
        }
    }

    function render(vdis, team) {
        const container = document.getElementById('vdi-display');
        container.innerHTML = vdis.map(v => `
            <div class="vdi-grid">
                <div>
                    <span class="vdi-name">${v.vdi_name}</span><br>
                    <span class="status-tag">${v.status}</span>
                </div>
                <div>
                    <select id="userSelect_${v.id}">
                        <option value="Available" ${v.user_name === 'Available' ? 'selected' : ''}>-- Select User --</option>
                        ${team.filter(t => t !== 'Available').map(u => `
                            <option value="${u}" ${v.user_name === u ? 'selected' : ''}>${u}</option>
                        `).join('')}
                    </select>
                </div>
                <div class="timestamp">
                    Last Update:<br>${new Date(v.updated_at).toLocaleTimeString()}
                </div>
                <div>
                    <button class="save-btn" onclick="saveChange(${v.id}, 'userSelect_${v.id}')">Save</button>
                </div>
            </div>
        `).join('');
    }

    loadData();
    setInterval(loadData, 10000); // Auto-refresh every 10 seconds
</script>
</body>
</html>
